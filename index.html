<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroCenter · farm & field</title>
    <!-- Font Awesome 6 (free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }

        body {
            background: #f4f7f0;
            color: #1e3b2a;
            line-height: 1.5;
        }

        :root {
            --green-deep: #1f4d2e;
            --green-lime: #558b3c;
            --soil: #a8682c;
            --cream: #faebd7;
            --sand: #f2e1c0;
            --light-bg: #f9fbf5;
        }

        /* ----- layout ----- */
        .top-bar {
            background-color: #123d1f;
            color: white;
            padding: 0.5rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            font-size: 0.9rem;
        }
        .contact-info span { margin-right: 2rem; }
        .contact-info i { color: #fad98b; margin-right: 0.3rem; }
        .user-links a {
            color: white; text-decoration: none; margin-left: 1.5rem;
            font-weight: 500; transition: 0.2s;
        }
        .user-links a:hover { color: #f7d975; }

        .main-header {
            background: white;
            padding: 0.7rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 4px 12px #d0ddc0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-icon {
            font-size: 2.4rem;
            color: var(--green-lime);
        }
        .logo-text h2 {
            font-size: 1.8rem;
            color: var(--green-deep);
            line-height: 1.2;
        }
        .logo-text p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #735e3a;
        }
        .search-bar {
            flex: 1 1 300px;
            max-width: 500px;
            margin: 0 2rem;
            display: flex;
            border-radius: 40px;
            overflow: hidden;
            border: 1.5px solid #c2d6b3;
            background: white;
        }
        .search-bar input {
            flex: 1;
            padding: 0.7rem 1.2rem;
            border: none;
            outline: none;
        }
        .search-bar button {
            background: var(--green-lime);
            border: none;
            padding: 0 1.5rem;
            color: white;
            cursor: pointer;
        }
        .header-icons {
            display: flex;
            gap: 2rem;
            align-items: center;
        }
        .icon-cart, .icon-user {
            font-size: 1.6rem;
            color: #1f4a2a;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-cart:hover, .icon-user:hover { color: var(--soil); }
        .cart-count {
            position: absolute;
            top: -10px; right: -12px;
            background: var(--soil);
            color: white;
            border-radius: 50%;
            font-size: 0.7rem;
            padding: 3px 7px;
            font-weight: bold;
        }

        /* ----- category / page nav ----- */
        .category-nav {
            background: #deecce;
            padding: 0.8rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            font-weight: 600;
            border-bottom: 3px solid #aec59e;
        }
        .category-nav a {
            text-decoration: none;
            color: #173e1f;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: 0.2s;
        }
        .category-nav a i { color: #3f722a; }
        .category-nav a:hover { color: #b45f1b; transform: translateY(-1px); }

        /* page indicator */
        .page-header {
            margin: 1.8rem 2rem 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .page-header h2 {
            font-size: 2.2rem;
            color: #1e532e;
            border-left: 10px solid var(--green-lime);
            padding-left: 1rem;
        }
        .back-link {
            background: #e3edd2;
            padding: 0.3rem 1.3rem;
            border-radius: 30px;
            text-decoration: none;
            color: #1d491d;
            font-weight: 500;
        }

        /* product grid (used on all catalog pages) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin: 1rem 2rem 3rem;
        }
        .product-card {
            background: white;
            border-radius: 28px;
            padding: 1.5rem 1rem 1.5rem;
            box-shadow: 0 8px 16px #ccddc0;
            transition: 0.25s;
            text-align: center;
            border: 1px solid #d3e4c1;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 28px #b1caa0;
        }
        .product-img { font-size: 4.5rem; color: #1f542f; margin-bottom: 0.5rem; }
        .product-category {
            background: #ebf3df; padding: 0.2rem 1rem; border-radius: 30px;
            align-self: center; font-size: 0.8rem; color: #5b4a30;
        }
        .product-title { font-size: 1.4rem; font-weight: 600; color: #1b4624; }
        .product-desc { font-size: 0.9rem; color: #4e6543; margin: 0.3rem 0; flex:1; }
        .price-row { margin: 0.8rem 0 1rem; }
        .current-price { font-size: 1.9rem; font-weight: 700; color: #b9530e; }
        .old-price { font-size: 1rem; color: #8d9e84; text-decoration: line-through; margin-left: 0.6rem; }
        .add-to-cart {
            background: var(--green-lime); color: white; border: none; padding: 0.8rem;
            border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 0.6rem;
            margin-top: auto; border: 1px solid #417d30;
        }
        .add-to-cart:hover { background: #2b6a3b; letter-spacing: 0.3px; }

        /* LOGIN MODAL (admin+user) */
        .login-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #142010c9;
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .login-modal.active { display: flex; }
        .login-panel {
            background: #fefef9;
            width: min(90%, 400px);
            padding: 2rem 2rem 1.8rem;
            border-radius: 48px;
            box-shadow: 0 20px 30px #1a301ac9;
            border: 3px solid #7ca86b;
        }
        .login-panel h3 {
            font-size: 2rem; color: #1c552c; margin-bottom: 0.5rem;
            display: flex; gap: 0.6rem; align-items: center;
        }
        .tabs {
            display: flex; gap: 0.5rem; margin: 1.2rem 0 1.5rem;
        }
        .tab-btn {
            flex: 1; padding: 0.7rem; border-radius: 40px; border: 2px solid #cbb59b;
            background: transparent; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active {
            background: var(--green-deep); color: white; border-color: var(--green-deep);
        }
        .login-form {
            display: flex; flex-direction: column; gap: 1.2rem;
        }
        .login-form input {
            padding: 0.9rem 1.2rem; border-radius: 50px; border: 1px solid #a1b892;
            font-size: 1rem;
        }
        .login-form button {
            background: var(--soil); color: white; padding: 1rem;
            border: none; border-radius: 40px; font-weight: 700; font-size: 1.2rem;
            cursor: pointer;
        }
        .close-modal {
            margin-top: 1rem; background: none; border: none;
            color: #5b754b; text-decoration: underline; cursor: pointer;
        }

        /* cart sidebar (exactly as before) */
        .cart-sidebar {
            position: fixed; top: 0; right: -400px; width: 340px; height: 100%;
            background: white; box-shadow: -6px 0 20px #264d2e50; transition: right 0.35s;
            padding: 2rem 1.5rem; z-index: 1500; border-left: 6px solid var(--green-lime);
            display: flex; flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        .cart-header { display: flex; justify-content: space-between; font-size: 1.8rem; color: var(--green-deep); margin-bottom: 2rem; }
        .close-cart { background: none; border: none; font-size: 2.2rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; list-style: none; }
        .cart-item {
            background: #f0f8e8; padding: 0.8rem; border-radius: 24px; margin-bottom: 0.8rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .cart-item-info { display: flex; flex-direction: column; }
        .cart-item-remove { background: none; border: none; color: #b1421b; font-size: 1.3rem; cursor: pointer; }
        .cart-total {
            font-size: 1.8rem; font-weight: 700; border-top: 2px dashed #b3cf9f;
            padding-top: 1rem; display: flex; justify-content: space-between;
        }
        .checkout-btn {
            background: var(--soil); color: white; border: none; padding: 1rem;
            border-radius: 40px; font-weight: 700; margin-top: 1rem; cursor: pointer;
        }
        .overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #142010b0; display: none; z-index: 1200;
        }
        .overlay.active { display: block; }

        /* order section (admin order viewer) */
        .orders-panel {
            background: #f1faea; margin: 2rem; padding: 1.5rem 2rem;
            border-radius: 48px; border: 2px solid #b5d4a2;
        }
        .orders-panel h3 { font-size: 2rem; color: #154d23; }
        .order-list {
            margin-top: 1rem; display: flex; flex-direction: column; gap: 1rem;
        }
        .order-card {
            background: white; border-radius: 40px; padding: 1rem 2rem;
            display: flex; flex-wrap: wrap; justify-content: space-between;
            border: 1px solid #abc999;
        }

        footer {
            background: #173320; color: #e2dfc7; padding: 2rem; text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
